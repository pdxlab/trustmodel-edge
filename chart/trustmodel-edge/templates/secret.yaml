{{- /*
Bootstrap token Secret — read once at pod start, then ignored. Mounted at
/etc/trustmodel/bootstrap-token via the Deployment.

Customers who manage secrets out-of-band (Vault, External Secrets Operator,
Sealed Secrets) can disable this by passing --set bootstrapToken="" and
creating a Secret named "<release>-trustmodel-edge" with key
"bootstrap-token" themselves.
*/ -}}
{{- if .Values.bootstrapToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trustmodel-edge.fullname" . }}
  labels:
    {{- include "trustmodel-edge.labels" . | nindent 4 }}
type: Opaque
stringData:
  bootstrap-token: {{ .Values.bootstrapToken | quote }}
{{- end }}
